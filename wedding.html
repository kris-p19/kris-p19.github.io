<!doctype html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wedding Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Charm&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fbfaf8;
            --card: #ffffff;
            --text: #1f1f1f;
            --muted: #6b6b6b;
            --line: rgba(0, 0, 0, .08);
            --accent: #b88a6a;
            --shadow: 0 10px 30px rgba(0, 0, 0, .06);
            --radius: 18px;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: "Charm", sans-serif;
            background: radial-gradient(1200px 600px at 20% -10%, rgba(184, 138, 106, .14), transparent 60%),
                radial-gradient(900px 500px at 90% 10%, rgba(184, 138, 106, .10), transparent 55%),
                var(--bg);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding: 28px 18px 64px
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 10px 0 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mark {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(184, 138, 106, .95), rgba(184, 138, 106, .35));
            box-shadow: var(--shadow);
            position: relative;
        }

        .mark:after {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .7);
        }

        .brand h1 {
            font-size: 16px;
            margin: 0;
            letter-spacing: .3px
        }

        .brand p {
            margin: 2px 0 0;
            font-size: 12px;
            color: var(--muted)
        }

        nav {
            display: flex;
            gap: 10px;
            align-items: center
        }

        .pill {
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, .6);
            backdrop-filter: blur(8px);
            font-size: 13px;
        }

        .hero {
            margin-top: 10px;
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255, 255, 255, .75), rgba(255, 255, 255, .55));
            border-radius: calc(var(--radius) + 8px);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        .hero-inner {
            padding: 28px 22px;
            display: grid;
            grid-template-columns: 1.2fr .8fr;
            gap: 18px;
            align-items: center;
        }

        .hero h2 {
            margin: 0 0 8px;
            font-size: 34px;
            line-height: 1.1
        }

        .hero .sub {
            margin: 0 0 18px;
            color: var(--muted);
            max-width: 54ch
        }

        .cta-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center
        }

        .btn {
            border: 1px solid var(--line);
            padding: 11px 14px;
            border-radius: 999px;
            background: var(--card);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
            font-family: "Charm", sans-serif;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(0, 0, 0, .08);
            border-color: rgba(184, 138, 106, .35)
        }

        .btn.primary {
            border-color: rgba(184, 138, 106, .55);
            background: linear-gradient(135deg, rgba(184, 138, 106, .95), rgba(184, 138, 106, .55));
            color: #fff;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .stat {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .65);
            border-radius: var(--radius);
            padding: 14px;
        }

        .stat .k {
            font-size: 12px;
            color: var(--muted)
        }

        .stat .v {
            font-size: 18px;
            font-weight: 700;
            margin-top: 6px
        }

        .toolbar {
            margin: 18px 2px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .65);
            padding: 9px 12px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            transition: border-color .12s ease, transform .12s ease;
        }

        .chip:hover {
            transform: translateY(-1px);
            border-color: rgba(184, 138, 106, .35)
        }

        .chip.active {
            border-color: rgba(184, 138, 106, .55);
            background: rgba(184, 138, 106, .12);
        }

        .search {
            position: relative;
            min-width: 220px;
            flex: 1;
            max-width: 380px;
        }

        .search input {
            width: 100%;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .72);
            padding: 11px 12px 11px 38px;
            border-radius: 999px;
            outline: none;
            font-size: 13px;
        }

        .search svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: .55;
        }

        /* Masonry */
        .grid {
            column-count: 3;
            column-gap: 14px;
            margin-top: 10px;
        }

        @media (max-width: 980px) {
            .grid {
                column-count: 2
            }

            .hero-inner {
                grid-template-columns: 1fr
            }
        }

        @media (max-width: 560px) {
            .grid {
                column-count: 1
            }

            .hero h2 {
                font-size: 28px
            }
        }

        .card {
            break-inside: avoid;
            margin: 0 0 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, .75);
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(0, 0, 0, .05);
            cursor: zoom-in;
            transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 34px rgba(0, 0, 0, .08);
            border-color: rgba(184, 138, 106, .35)
        }

        .thumb {
            width: 100%;
            display: block;
            background: #eee;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 12px 13px;
            align-items: flex-start;
        }

        .meta .title {
            font-weight: 700;
            font-size: 13px;
            margin: 0
        }

        .meta .tag {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px
        }

        .badge {
            font-size: 11px;
            padding: 6px 9px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(184, 138, 106, .10);
            white-space: nowrap;
        }

        /* Lightbox */
        .lb {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .72);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 50;
        }

        .lb.open {
            display: flex
        }

        .lb-dialog {
            width: min(980px, 100%);
            background: rgba(255, 255, 255, .92);
            border-radius: calc(var(--radius) + 10px);
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0, 0, 0, .30);
            border: 1px solid rgba(255, 255, 255, .25);
        }

        .lb-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(0, 0, 0, .08);
        }

        .lb-top .t {
            font-weight: 800
        }

        .lb-top .x {
            border: 1px solid rgba(0, 0, 0, .10);
            background: rgba(255, 255, 255, .75);
            padding: 8px 10px;
            border-radius: 999px;
            cursor: pointer;
        }

        .lb-body {
            display: grid;
            grid-template-columns: 56px 1fr 56px;
            align-items: center;
            gap: 10px;
            padding: 14px;
        }

        .lb-nav {
            height: 52px;
            width: 52px;
            border-radius: 999px;
            border: 1px solid rgba(0, 0, 0, .10);
            background: rgba(255, 255, 255, .75);
            cursor: pointer;
            font-size: 22px;
        }

        .lb-img {
            width: 100%;
            max-height: 72vh;
            object-fit: contain;
            border-radius: var(--radius);
            background: #f3f2f0;
        }

        footer {
            margin-top: 34px;
            padding-top: 18px;
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <header>
            <div class="brand">
                <div class="mark" aria-hidden="true"></div>
                <div>
                    <h1>Wedding Gallery</h1>
                    <p>Memories in soft light</p>
                </div>
            </div>
            <nav>
                <a class="pill" href="#gallery">Gallery</a>
                <a class="pill" href="#contact">Contact</a>
            </nav>
        </header>

        <section class="hero">
            <div class="hero-inner">
                <div>
                    <h2>Natkamon &amp; Natdanai <br> 2 มกราคม 2569</h2>
                    <p style="display:none;" class="sub">รวมภาพความทรงจำตั้งแต่พิธีเช้า งานเลี้ยง ไปจนถึงพอร์ตเทรตสุดอบอุ่น — กดดูแบบเต็มจอได้</p>
                    <br>
                    <div class="cta-row">
                        <button class="btn primary" id="scrollToGallery">ดูรูปทั้งหมด</button>
                        <button style="display:none;" class="btn" id="downloadHint">ขอไฟล์ต้นฉบับ</button>
                    </div>
                </div>
                <div class="stats" aria-label="album stats">
                    <div class="stat">
                        <div class="k">Photos</div>
                        <div class="v" id="statPhotos">—</div>
                    </div>
                    <div class="stat">
                        <div class="k">Categories</div>
                        <div class="v" id="statCats">—</div>
                    </div>
                    <div class="stat">
                        <div class="k">Location</div>
                        <div class="v">นครศรีธรรมราช</div>
                    </div>
                    <div class="stat">
                        <div class="k">Mood</div>
                        <div class="v">Warm &amp; Classic</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="toolbar" id="gallery">
            <div class="filters" id="filters" style="display:none;"></div>

            <div class="search" style="display:none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="currentColor" stroke-width="2" />
                    <path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
                <input id="q" placeholder="ค้นหาด้วยคำ เช่น portrait, ceremony, ring..." />
            </div>
        </section>

        <section class="grid" id="grid"></section>

        <footer id="contact">
            <div>© <span id="year"></span> Wedding Gallery</div>
            <!-- <div>ติดต่อช่างภาพ: <a href="#" aria-label="contact link">hello@yourstudio.com</a></div> -->
        </footer>
    </div>

    <!-- Lightbox -->
    <div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="image viewer">
        <div class="lb-dialog">
            <div class="lb-top">
                <div class="t" id="lbTitle">—</div>
                <button class="x" id="lbClose" aria-label="close">ปิด ✕</button>
            </div>
            <div class="lb-body">
                <button class="lb-nav" id="lbPrev" aria-label="previous">‹</button>
                <img class="lb-img" id="lbImg" alt="selected photo" />
                <button class="lb-nav" id="lbNext" aria-label="next">›</button>
            </div>
        </div>
    </div>

    <script>
        // 🔁 แก้ URL รูปตรงนี้ (ตัวอย่างใช้รูป placeholder แบบสุ่ม)
        const photos = [
            // { src: "/assets/img/wedding/card-front.png", title: "bb", cat: "vv", tags: ["a"] },
            // { src: "/assets/img/wedding/card-back.png", title: "bb", cat: "vv", tags: ["a"] },
            // { src: "/assets/img/card-front.png", title: "Portrait – Soft smile", cat: "Portrait", tags: ["portrait"] },
            // { src: "/assets/img/card-front.png", title: "Details – Rings", cat: "Details", tags: ["ring", "details"] },
            // { src: "/assets/img/card-front.png", title: "Reception – First dance", cat: "Reception", tags: ["dance", "reception"] },
            // { src: "/assets/img/card-back.png", title: "Portrait – Golden hour", cat: "Portrait", tags: ["golden"] },
            // { src: "/assets/img/card-back.png", title: "Details – Bouquet", cat: "Details", tags: ["bouquet"] },
            // { src: "/assets/img/card-back.png", title: "Reception – Cheers", cat: "Reception", tags: ["toast"] },
            // { src: "/assets/img/card-back.png", title: "Portrait – Candid", cat: "Portrait", tags: ["candid"] },
        ];

        for (let index = 1; index <= 37; index++) {
            photos.push({ src: `/assets/img/wedding/wedding (${index}).jpg`, title: "แก้ม & ต๊ะ", cat: "Wedding", tags: ["2 มกราคม 2568"] });
        }

        const cats = ["All", ...Array.from(new Set(photos.map(p => p.cat)))];
        const filtersEl = document.getElementById("filters");
        const gridEl = document.getElementById("grid");
        const qEl = document.getElementById("q");

        const statPhotos = document.getElementById("statPhotos");
        const statCats = document.getElementById("statCats");
        statPhotos.textContent = photos.length;
        statCats.textContent = cats.length - 1;

        document.getElementById("year").textContent = new Date().getFullYear();

        let activeCat = "All";
        let activeIdx = 0;
        let filtered = photos.slice();

        function renderFilters() {
            filtersEl.innerHTML = "";
            cats.forEach(c => {
                const b = document.createElement("div");
                b.className = "chip" + (c === activeCat ? " active" : "");
                b.textContent = c;
                b.onclick = () => { activeCat = c; apply(); renderFilters(); };
                filtersEl.appendChild(b);
            });
        }

        function matches(p, q) {
            if (!q) return true;
            q = q.trim().toLowerCase();
            const hay = (p.title + " " + p.cat + " " + (p.tags || []).join(" ")).toLowerCase();
            return hay.includes(q);
        }

        function apply() {
            const q = qEl.value || "";
            filtered = photos.filter(p => (activeCat === "All" || p.cat === activeCat) && matches(p, q));
            renderGrid();
        }

        function renderGrid() {
            gridEl.innerHTML = "";
            if (filtered.length === 0) {
                const empty = document.createElement("div");
                empty.style.color = "var(--muted)";
                empty.style.padding = "18px 2px";
                empty.textContent = "ไม่พบรูปที่ตรงกับตัวกรอง ลองเปลี่ยนหมวดหรือคำค้นหา";
                gridEl.appendChild(empty);
                return;
            }

            filtered.forEach((p, i) => {
                const card = document.createElement("article");
                card.className = "card";
                card.onclick = () => openLightbox(i);

                const img = document.createElement("img");
                img.className = "thumb";
                img.loading = "lazy";
                img.alt = p.title;
                img.src = p.src;

                const meta = document.createElement("div");
                meta.className = "meta";

                const left = document.createElement("div");
                const title = document.createElement("p");
                title.className = "title";
                title.textContent = p.title;
                const tag = document.createElement("div");
                tag.className = "tag";
                tag.textContent = (p.tags || []).slice(0, 3).join(" • ");
                left.appendChild(title);
                left.appendChild(tag);

                const badge = document.createElement("div");
                badge.className = "badge";
                badge.textContent = p.cat;

                meta.appendChild(left);
                meta.appendChild(badge);

                card.appendChild(img);
                card.appendChild(meta);
                gridEl.appendChild(card);
            });
        }

        // Lightbox
        const lb = document.getElementById("lb");
        const lbImg = document.getElementById("lbImg");
        const lbTitle = document.getElementById("lbTitle");

        function openLightbox(i) {
            activeIdx = i;
            const p = filtered[activeIdx];
            lbImg.src = p.src;
            lbTitle.textContent = p.title + " — " + p.cat;
            lb.classList.add("open");
            document.body.style.overflow = "hidden";
        }
        function closeLightbox() {
            lb.classList.remove("open");
            document.body.style.overflow = "";
        }
        function step(dir) {
            if (!filtered.length) return;
            activeIdx = (activeIdx + dir + filtered.length) % filtered.length;
            const p = filtered[activeIdx];
            lbImg.src = p.src;
            lbTitle.textContent = p.title + " — " + p.cat;
        }

        document.getElementById("lbClose").onclick = closeLightbox;
        document.getElementById("lbPrev").onclick = () => step(-1);
        document.getElementById("lbNext").onclick = () => step(1);
        lb.addEventListener("click", (e) => { if (e.target === lb) closeLightbox(); });
        window.addEventListener("keydown", (e) => {
            if (!lb.classList.contains("open")) return;
            if (e.key === "Escape") closeLightbox();
            if (e.key === "ArrowLeft") step(-1);
            if (e.key === "ArrowRight") step(1);
        });

        qEl.addEventListener("input", apply);
        document.getElementById("scrollToGallery").onclick = () => {
            document.getElementById("gallery").scrollIntoView({ behavior: "smooth" });
        };
        document.getElementById("downloadHint").onclick = () => {
            alert("ใส่ลิงก์ Google Drive / Dropbox / Pixieset ของไฟล์ต้นฉบับตรงนี้ได้เลย 🙂");
        };

        renderFilters();
        apply();
    </script>
</body>

</html>
